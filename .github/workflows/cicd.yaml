name: Deploy Application Docker Image to EC2

on:
  push:
    branches: [ main ]

jobs:
  Continuous-Integration:
    runs-on: self-hosted   # FIX 1: Use your EC2 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4   # FIX 2: Updated version
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2            # FIX 3: Updated version

      - name: Build, tag, and push image to ECR
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest

  Continuous-Deployment:
    needs: Continuous-Integration
    runs-on: self-hosted   # FIX 4: Also self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy Container
        run: |
          docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest
          docker stop luxe-app || true
          docker rm luxe-app || true

          docker run -d \
            --name luxe-app \
            --restart always \
            -e MONGO_URI="${{ secrets.MONGO_URI }}" \
            -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            -e LOGFIRE_TOKEN="${{ secrets.LOGFIRE_TOKEN }}" \
            -p 8000:8000 \
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest

          docker image prune -f